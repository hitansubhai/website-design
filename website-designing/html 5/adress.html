<label for="flavor-input">Choose a flavor:</label>
<input type="text" id="flavor-input" name="flavor" list="flavors" placeholder="Type or select...">

<datalist id="flavors">
    <option value="Chocolate"></option>
    <option value="Vanilla"></option>
    <option value="Strawberry"></option>
    <option value="Mint"></option>
</datalist>
