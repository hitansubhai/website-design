<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Media</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }

        .media-container {
            margin: 20px auto;
            max-width: 600px;
        }

        iframe {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <h2>My Favorite IPL Moment</h2>
    <div class="media-container">
        <!-- YouTube iFrame -->
        <iframe width="100%" height="315"
            src="https://www.iplt20.com/en/video/s-all-first-ball-boundaries-by-vaibhav-sooryavanshi-in-tata-ipl-2026-jldwzd"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

    <h2>Favorite Music Track</h2>
    <div class="media-container">
        <!-- Spotify iFrame -->
        <iframe src="https://open.spotify.com/embed/track/0VjIjW4GlUZAMYd2vXMi3b?utm_source=generator" width="100%"
            height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
        </iframe>
    </div>

</body>

</html>
