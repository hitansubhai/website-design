<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Assignment - Online Editor Tasks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }

        /* Profile Card Styling */
        .card {
            width: 250px;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card h2 {
            margin: 10px 0 5px;
            color: #333;
        }

        .card p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        /* Menu Section Styling */
        .menu-table {
            width: 100%;
            max-width: 400px;
            border-collapse: collapse;
            background-color: #ffffff;
            margin-bottom: 15px;
        }

        .menu-table th,
        .menu-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .menu-table th {
            background-color: #cb202d;
            /* Zomato Red */
            color: white;
        }

        .btn-order {
            background-color: #cb202d;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-order:hover {
            background-color: #a01722;
        }
    </style>
</head>

<body>

    <!-- Task 1: Display 'Hello, Web World!' in an <h1> tag -->
    <h1>Hello, Web World!</h1>

    <hr>

    <!-- Task 2: Profile card for favorite IPL cricket player -->
    <h2>Player Profile Card</h2>
    <div class="card">
        <img src="https://cdn.britannica.com/48/252748-050-C514EFDB/Virat-Kohli-India-celebrates-50th-century-Cricket-November-15-2023.jpg"
            alt="Virat Kohli">
        <h2>Virat Kohli</h2>
        <p><strong>Team:</strong> Royal Challengers Bengaluru (RCB)</p>
        <p><strong>Role:</strong> Right-Handed Batsman</p>
    </div>

    <hr>

    <!-- Task 3: Zomato-style restaurant menu section using a table -->
    <h2>Zomato Menu</h2>
    <table class="menu-table">
        <thead>
            <tr>
                <th>Dish Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Butter Paneer Masala</td>
                <td>₹280</td>
            </tr>
            <tr>
                <td>Garlic Naan</td>
                <td>₹60</td>
            </tr>
            <tr>
                <td>Veg Biryani</td>
                <td>₹220</td>
            </tr>
        </tbody>
    </table>

    <!-- Task 4: Clickable button showing an alert 'Order Placed!' -->
    <button class="btn-order" onclick="alert('Order Placed!')">Place Order</button>

</body>

</html>
