<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Review</title>
</head>

<body>

    <h2>Write a Product Review</h2>

    <form action="#" method="post">
        <!-- User Name -->
        <p>
            <label for="name">Your Name:</label><br>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </p>

        <!-- Product Name -->
        <p>
            <label for="product_name">Product Name:</label><br>
            <input type="text" id="product_name" name="product_name" required placeholder="Enter product name">
        </p>

        <!-- Rating (1 to 5) -->
        <p>
            <label for="rating">Rating (1 to 5):</label><br>
            <select id="rating" name="rating" required>
                <option value="">Select Rating</option>
                <option value="1">1 - Very Poor</option>
                <option value="2">2 - Poor</option>
                <option value="3">3 - Average</option>
                <option value="4">4 - Good</option>
                <option value="5">5 - Excellent</option>
            </select>
        </p>

        <!-- Review Message -->
        <p>
            <label for="review">Review Message:</label><br>
            <textarea id="review" name="review" rows="5" cols="40" required
                placeholder="Write your review here..."></textarea>
        </p>

        <!-- Submit Button -->
        <p>
            <button type="submit">Submit Review</button>
        </p>
    </form>

</body>

</html>
