<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Artist</title>
</head>

<body>

    <h1>My Favorite Music Artist</h1>

    <!-- Task 1, 3 & 5: Image using an absolute URL with descriptive alt text for SEO and accessibility -->
    <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=600"
        alt="Arijit Singh photo performing live on stage with a guitar" width="400">

    <!-- Task 5: Explanation comment for alt text choices -->
    <!-- 
      Alt Text Explanation:
      1. Included the artist's name ('Arijit Singh') and the word 'photo' for SEO optimization and clarity.
      2. Described the context (performing live with a guitar) so screen reader users get a clear mental image.
      3. Avoided generic terms like 'image of', ensuring accessibility standards are met efficiently.
    -->

    <br><br>

    <!-- Task 2: Anchor tag linking to the artist's Instagram page in a new tab -->
    <a href="https://www.instagram.com/arijitsingh/" target="_blank" rel="noopener noreferrer">
        Visit Official Instagram Profile
    </a>

    <br><br>
    <hr>

    <!-- Task 4: Relative link to favfood.html -->
    <p>Check out my favorite food page: <a href="favfood.html">Go to Favorite Food Page</a></p>

</body>

</html>
