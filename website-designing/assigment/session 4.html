<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
        }
        .content-box {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .action-btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
        .action-btn:hover {
            background-color: #0369a1;
        }
        /* This box is hidden by default using CSS */
        #resultBox {
            margin-top: 20px;
            padding: 15px;
            background-color: #dcfce7;
            border-left: 5px solid #22c55e;
            display: none; 
        }
    </style>
</head>
<body>

    <header>
        <h1>My Interactive Page</h1>
        <p>HTML, CSS, and JavaScript working together!</p>
    </header>

    <main class="content-box">
        <h2>Test the JavaScript</h2>
        <p>Type your name below and click the button to see JavaScript in action.</p>

        <label for="userName"><strong>Your Name:</strong></label><br>
        <input type="text" id="userName" placeholder="e.g. Alex" style="padding: 8px; width: 200px; margin-top: 5px;">
        <br>
        
        <button class="action-btn" onclick="greetUser()">Say Hello</button>

        <div id="resultBox">
            <h3 id="greetingText"></h3>
            <p>You just used JavaScript to change the webpage without reloading it!</p>
        </div>
    </main>

    <script>
        function greetUser() {
            // 1. Get the text the user typed into the input box
            let name = document.getElementById("userName").value;

            // 2. Check if they left it blank
            if (name === "") {
                alert("Please type your name first!");
                return; // Stop running the function
            }

            // 3. Change the text inside the <h3> tag
            document.getElementById("greetingText").innerText = "Hello, " + name + "!";

            // 4. Change the CSS to make the hidden result box visible
            document.getElementById("resultBox").style.display = "block";
        }
    </script>

</body>
</html>
