<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBites | Fresh Food Delivered Fast</title>
    <style>
        .dish-card {
            border: 1px solid hsl(0, 79%, 58%);
            padding: 16px;
            margin: 16px;
            border-radius: 8px;
        }

        div.dish-card img {
            width: 50%;
            height: 10%;
            border-radius: 8px;
            padding: 8px;
            margin: 2px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Welcome to QuickBites</h1>
        <p>Your favorite meals, delivered straight to your doorstep.</p>
    </header>

    <main>
        <section>
            <h2>Today's Special Dishes</h2>

            <!-- Dish 1 -->
            <div class="dish-card" align="center">
                <img alt="A freshly baked pepperoni pizza with melting mozzarella cheese and bubbling tomato sauce on a thick crust."
                    src="photo/pizza.avif">
                <h3>Classic Pepperoni Pizza</h3>
            </div>

            <!-- Dish 2 -->
            <div class="dish-card" align="center">
                <img src="photo/Pav-bhaji.jpg"
                    alt="It consists of a thick, spiced vegetable curry (bhaji) made from mashed potatoes">
                <h3>Pav Bhaji</h3>
            </div>

            <!-- Dish 3 -->
            <div class="dish-card" align="center">
                <img src="photo/barger.jpeg"
                    alt="A gourmet beef burger stacked with cheddar cheese, crisp lettuce, ripe tomato slices, and house sauce in a toasted brioche bun.">
                <h3>Gourmet Cheeseburger</h3>
            </div>
        </section>
    </main>

</body>

</html>
