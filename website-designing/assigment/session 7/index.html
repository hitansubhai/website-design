<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Favorite Food - sessionStorage</title>
</head>

<body>

    <button onclick="saveFood()">Save Favorite Food</button>
    <p id="foodResult"></p>

    <script>
        function saveFood() {
            const food = prompt("What is your favorite food? (e.g., pizza, biryani)");
            if (food) {
                sessionStorage.setItem('favFood', food);
                document.getElementById('foodResult').textContent =
                    "Saved favorite food: " + sessionStorage.getItem('favFood');
            }
        }
    </script>

</body>

</html>
